<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Etiquetas de Caducidad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;padding:10px;max-width:500px;margin:0 auto}
h1{text-align:center;color:#1a237e;font-size:1.2em;padding:10px 0 12px}
.card{background:#fff;border-radius:8px;padding:13px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.13)}
.card h2{font-size:.85em;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px;display:flex;justify-content:space-between;align-items:center}
label{display:block;font-size:.78em;font-weight:700;color:#555;margin-bottom:2px;margin-top:7px}
label:first-of-type{margin-top:0}
input,select{width:100%;padding:9px 10px;border:1px solid #ccc;border-radius:5px;font-size:.95em;background:#fafafa}
input:focus,select:focus{outline:none;border-color:#3949ab;background:#fff}
.row{display:flex;gap:8px}
.row>div{flex:1;min-width:0}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:6px;font-size:1em;cursor:pointer;margin-bottom:8px;font-weight:700;transition:filter .12s}
.btn:active{filter:brightness(.88)}
.b-imp{background:#1565C0;color:#fff}
.b-test{background:#E65100;color:#fff}
.b-sm{padding:6px 14px;width:auto;font-size:.85em;border-radius:4px}
.b-save{background:#2e7d32;color:#fff}
.b-cfg{background:none;border:1px solid #ccc;color:#666;font-size:.75em;cursor:pointer;border-radius:4px;padding:3px 8px}
#preview{font-family:'Courier New',monospace;font-size:.75em;white-space:pre;padding:10px 12px;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:5px;min-height:88px;color:#333;line-height:1.55}
#st{padding:9px 12px;border-radius:5px;margin-bottom:10px;font-weight:700;font-size:.88em;display:none;text-align:center}
.ok{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
.er{background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a}
.wt{background:#fff8e1;color:#e65100;border:1px solid #ffe082}
.cfg-row{display:flex;gap:6px;align-items:flex-end}
.cfg-row>div:first-child{flex:1}
.cfg-row>div:last-child{width:90px}
#cfg-status{font-size:.75em;margin-top:4px;color:#666;min-height:16px}
.hide{display:none}
</style>
</head>
<body>
<h1>Etiquetas de Caducidad</h1>
<div id="st"></div>

<div class="card">
  <h2>Producto</h2>
  <label>Preset</label>
  <select id="preset" onchange="onPreset()">
    <option value="">-- Cargando... --</option>
  </select>
  <label>Nombre del producto *</label>
  <input type="text" id="producto" placeholder="Nombre del producto" oninput="upd()" autocomplete="off">
</div>

<div class="card">
  <h2>Fechas</h2>
  <div class="row">
    <div>
      <label>Realizaci&#xF3;n *</label>
      <input type="date" id="realizacion" onchange="onReal()">
    </div>
    <div>
      <label>Envasado *</label>
      <input type="date" id="envasado" onchange="upd()">
    </div>
  </div>
  <div class="row">
    <div>
      <label>Caducidad *</label>
      <input type="date" id="caducidad" onchange="upd()">
    </div>
    <div>
      <label>Congelado</label>
      <input type="date" id="congelado" onchange="upd()">
    </div>
  </div>
</div>

<div class="card">
  <h2>Opciones</h2>
  <label>N&#xFA;mero de copias</label>
  <input type="number" id="copias" value="1" min="1" max="10" style="width:90px">
</div>

<div class="card">
  <h2>Vista previa</h2>
  <div id="preview">Rellena el formulario...</div>
</div>

<button class="btn b-imp" onclick="send(false)">&#128438; Imprimir</button>
<button class="btn b-test" onclick="send(true)">&#9881; Imprimir prueba</button>

<div class="card">
  <h2>Impresora <button class="b-cfg" onclick="toggleCfg()">&#9881; Config</button></h2>
  <div id="cfg-panel" class="hide">
    <label>Conexi&#xF3;n</label>
    <select id="cfg_backend" onchange="onBackend()">
      <option value="network">Red (RJ45 / WiFi, TCP 9100)</option>
      <option value="usb">USB (/dev/usb/lp0)</option>
      <option value="escpos">USB (python-escpos, vendor/product id)</option>
      <option value="serial">Serie RS232 (115200 8N1 RTS/CTS)</option>
    </select>

    <div id="cfg-net">
      <div class="cfg-row" style="margin-top:7px">
        <div>
          <label>IP de la impresora</label>
          <input type="text" id="cfg_ip" placeholder="192.168.34.133">
        </div>
        <div>
          <label>Puerto</label>
          <input type="number" id="cfg_port" value="9100" min="1" max="65535">
        </div>
      </div>
    </div>

    <div id="cfg-usb" class="hide">
      <label>Dispositivo USB</label>
      <input type="text" id="cfg_usb_device" placeholder="/dev/usb/lp0">
    </div>

    <div id="cfg-escpos" class="hide">
      <div class="row" style="margin-top:7px">
        <div>
          <label>Vendor ID</label>
          <input type="text" id="cfg_vid" placeholder="0x0416">
        </div>
        <div>
          <label>Product ID</label>
          <input type="text" id="cfg_pid" placeholder="0x5011">
        </div>
      </div>
    </div>

    <div id="cfg-serial" class="hide">
      <div class="cfg-row" style="margin-top:7px">
        <div>
          <label>Puerto serie</label>
          <input type="text" id="cfg_serial_port" placeholder="/dev/ttyUSB0">
        </div>
        <div>
          <label>Baudios</label>
          <input type="number" id="cfg_serial_baud" value="115200">
        </div>
      </div>
    </div>

    <button class="btn b-sm b-save" onclick="saveCfg()" style="margin-top:8px">Guardar</button>
    <div id="cfg-status"></div>
  </div>
  <div id="cfg-summary" style="font-size:.82em;color:#777;margin-top:2px">Cargando...</div>
</div>

<script>
var PRODUCTS = [];

// ── Cargar productos ──────────────────────────────────────────────────────────
fetch('/products')
  .then(function(r){return r.json()})
  .then(function(list){
    PRODUCTS = list;
    var s = document.getElementById('preset');
    s.innerHTML = '<option value="">-- Seleccionar preset --</option>';
    list.forEach(function(p,i){
      var o = document.createElement('option');
      o.value = i;
      o.textContent = p.name + ' (' + p.days + 'd)';
      s.appendChild(o);
    });
    var t = iso(new Date());
    document.getElementById('realizacion').value = t;
    document.getElementById('envasado').value = t;
    upd();
  });

// ── Cargar config impresora ───────────────────────────────────────────────────
fetch('/config')
  .then(function(r){return r.json()})
  .then(function(c){
    document.getElementById('cfg_backend').value = c.backend || 'network';
    document.getElementById('cfg_ip').value = c.printer_ip || '';
    document.getElementById('cfg_port').value = c.printer_port || 9100;
    document.getElementById('cfg_usb_device').value = c.usb_device || '/dev/usb/lp0';
    document.getElementById('cfg_vid').value = c.usb_vendor_id || '';
    document.getElementById('cfg_pid').value = c.usb_product_id || '';
    document.getElementById('cfg_serial_port').value = c.serial_port || '/dev/ttyUSB0';
    document.getElementById('cfg_serial_baud').value = c.serial_baud || 115200;
    onBackend();
    updSummary(c);
  });

function updSummary(c){
  var s = c.backend === 'network' ? ('Red ' + c.printer_ip + ':' + c.printer_port)
        : c.backend === 'usb'     ? ('USB ' + c.usb_device)
        : c.backend === 'serial'  ? ('Serie ' + c.serial_port + '@' + c.serial_baud)
        :                           ('USB escpos ' + c.usb_vendor_id + ':' + c.usb_product_id);
  document.getElementById('cfg-summary').textContent = s;
}

function onBackend(){
  var b = document.getElementById('cfg_backend').value;
  document.getElementById('cfg-net').classList.toggle('hide', b !== 'network');
  document.getElementById('cfg-usb').classList.toggle('hide', b !== 'usb');
  document.getElementById('cfg-escpos').classList.toggle('hide', b !== 'escpos');
  document.getElementById('cfg-serial').classList.toggle('hide', b !== 'serial');
}

// ── Helpers de fecha ──────────────────────────────────────────────────────────
function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pad(n){return n<10?'0'+n:n}
function fmt(v){if(!v) return '';var p=v.split('-');return p[2]+'/'+p[1]+'/'+p[0]}

// ── Presets ───────────────────────────────────────────────────────────────────
function onPreset(){
  var i = document.getElementById('preset').value;
  if(i === '') return;
  document.getElementById('producto').value = PRODUCTS[+i].name;
  onReal();
}

function onReal(){
  var r = document.getElementById('realizacion').value;
  var i = document.getElementById('preset').value;
  if(r && i !== ''){
    var d = new Date(r + 'T00:00:00');
    d.setDate(d.getDate() + PRODUCTS[+i].days);
    document.getElementById('caducidad').value = iso(d);
  }
  if(!document.getElementById('envasado').value)
    document.getElementById('envasado').value = document.getElementById('realizacion').value;
  upd();
}

// ── Preview ───────────────────────────────────────────────────────────────────
function upd(){
  var nm = document.getElementById('producto').value || '(sin nombre)';
  var r  = fmt(document.getElementById('realizacion').value) || '--/--/----';
  var e  = fmt(document.getElementById('envasado').value)    || '--/--/----';
  var c  = fmt(document.getElementById('caducidad').value)   || '--/--/----';
  var f  = fmt(document.getElementById('congelado').value);
  var L  = [
    '================================',
    ' ' + nm.substring(0,24).toUpperCase(),
    '--------------------------------',
    'Realizacion: ' + r,
    'Envasado:    ' + e,
    '   CAD: ' + c
  ];
  if(f) L.push('Congelado:   ' + f);
  L.push('================================');
  document.getElementById('preview').textContent = L.join('\n');
}

// ── Validación ────────────────────────────────────────────────────────────────
function validate(nm){
  if(!nm){alert('El nombre del producto es obligatorio.');return false}
  var r = document.getElementById('realizacion').value;
  var e = document.getElementById('envasado').value;
  var c = document.getElementById('caducidad').value;
  if(!r){alert('Fecha de realizaci\xF3n obligatoria.');return false}
  if(!e){alert('Fecha de envasado obligatoria.');return false}
  if(!c){alert('Fecha de caducidad obligatoria.');return false}
  if(c < r){alert('La caducidad debe ser posterior a la realizaci\xF3n.');return false}
  return true;
}

// ── Estado ────────────────────────────────────────────────────────────────────
function showSt(cls, msg){
  var s = document.getElementById('st');
  s.className = cls; s.textContent = msg; s.style.display = 'block';
}

// ── Imprimir ──────────────────────────────────────────────────────────────────
function send(test){
  var nm = document.getElementById('producto').value.trim();
  if(!test && !validate(nm)) return;
  var d = {
    producto:    nm,
    realizacion: fmt(document.getElementById('realizacion').value),
    envasado:    fmt(document.getElementById('envasado').value),
    caducidad:   fmt(document.getElementById('caducidad').value),
    congelado:   fmt(document.getElementById('congelado').value),
    copias:      parseInt(document.getElementById('copias').value) || 1,
    test:        test
  };
  showSt('wt','Enviando...');
  fetch('/print', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(d)
  })
  .then(function(r){return r.json()})
  .then(function(r){
    if(r.ok) showSt('ok','✔ Impresi\xF3n enviada correctamente');
    else showSt('er','✘ Error: ' + (r.msg || 'respuesta desconocida'));
  })
  .catch(function(){showSt('er','✘ Sin conexi\xF3n con el servidor')});
}

// ── Config impresora ──────────────────────────────────────────────────────────
function toggleCfg(){
  var p = document.getElementById('cfg-panel');
  p.classList.toggle('hide');
}

function saveCfg(){
  var backend = document.getElementById('cfg_backend').value;
  var st = document.getElementById('cfg-status');
  var body = {backend: backend};
  if(backend === 'network'){
    body.printer_ip = document.getElementById('cfg_ip').value.trim();
    body.printer_port = parseInt(document.getElementById('cfg_port').value);
    if(!body.printer_ip || !body.printer_port){st.textContent='IP o puerto inválidos';return}
  } else if(backend === 'usb'){
    body.usb_device = document.getElementById('cfg_usb_device').value.trim();
  } else if(backend === 'serial'){
    body.serial_port = document.getElementById('cfg_serial_port').value.trim();
    body.serial_baud = parseInt(document.getElementById('cfg_serial_baud').value) || 115200;
  } else {
    body.usb_vendor_id = document.getElementById('cfg_vid').value.trim();
    body.usb_product_id = document.getElementById('cfg_pid').value.trim();
  }
  st.textContent = 'Guardando...';
  fetch('/config', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  })
  .then(function(r){return r.json()})
  .then(function(r){
    if(r.ok){
      st.textContent = '✔ Guardado';
      updSummary(r.config);
      setTimeout(function(){st.textContent=''},2000);
    } else {
      st.textContent = 'Error: ' + (r.msg||'?');
    }
  })
  .catch(function(){st.textContent='Error de red'});
}
</script>
</body>
</html>
